name: PR Previews

# Captures screenshots of the pages a PR changes and posts them as a single,
# self-updating sticky comment. Images are hosted on the orphan `pr-previews`
# branch and referenced via raw.githubusercontent.com so GitHub renders them
# inline. Kept separate from pr-test.yml so a preview failure never blocks the
# gating test signal, and so the test job keeps its read-only permissions.

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review, closed]

permissions:
  contents: write # push screenshots to the pr-previews branch
  pull-requests: write # create/update the sticky comment

concurrency:
  group: pr-previews-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  previews:
    # Skip on close (handled by `cleanup`) and on fork PRs, whose GITHUB_TOKEN is
    # read-only and cannot push the branch or comment — degrade cleanly instead.
    if: >-
      github.event.action != 'closed' &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright (chromium)
        run: npx playwright install --with-deps chromium

      - name: Build site
        run: npm run build

      - name: Resolve changed routes
        id: routes
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            const { resolveChangedRoutes } = require('./scripts/resolve-changed-routes.js');
            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              per_page: 100,
            });
            const changed = files.map((f) => f.filename);
            const routes = resolveChangedRoutes(changed, { siteDir: '_site' });
            fs.writeFileSync('previews-routes.json', JSON.stringify(routes, null, 2));
            core.setOutput('count', String(routes.length));
            console.log('Changed files:\n' + changed.join('\n'));
            console.log('Resolved routes:\n' + routes.map((r) => r.path).join('\n'));

      - name: Capture previews
        if: steps.routes.outputs.count != '0'
        run: node scripts/capture-previews.js --routes-file previews-routes.json

      - name: Publish previews to pr-previews branch
        id: publish
        if: steps.routes.outputs.count != '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          BRANCH="pr-previews"
          SHA="$(git rev-parse --short "$HEAD_SHA")"
          REMOTE="https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          WORK="$(mktemp -d)"

          git -C "$WORK" init -q
          git -C "$WORK" config user.name "github-actions[bot]"
          git -C "$WORK" config user.email "github-actions[bot]@users.noreply.github.com"
          git -C "$WORK" remote add origin "$REMOTE"

          if git -C "$WORK" ls-remote --exit-code origin "$BRANCH" >/dev/null 2>&1; then
            git -C "$WORK" fetch -q --depth 1 origin "$BRANCH"
            git -C "$WORK" checkout -q -b "$BRANCH" FETCH_HEAD
          else
            git -C "$WORK" checkout -q --orphan "$BRANCH"
          fi

          # Keep only the latest screenshots for this PR.
          rm -rf "$WORK/pr-${PR_NUMBER}"
          mkdir -p "$WORK/pr-${PR_NUMBER}/${SHA}"
          cp -R "$GITHUB_WORKSPACE/previews-output/." "$WORK/pr-${PR_NUMBER}/${SHA}/"

          git -C "$WORK" add -A
          if [ -n "$(git -C "$WORK" status --porcelain)" ]; then
            git -C "$WORK" commit -q -m "previews: PR #${PR_NUMBER} @ ${SHA}"
            git -C "$WORK" push -q origin "$BRANCH"
          fi
          echo "sha=${SHA}" >> "$GITHUB_OUTPUT"

      - name: Upsert preview comment
        if: always() && steps.routes.outcome == 'success'
        uses: actions/github-script@v9
        env:
          SHA: ${{ steps.publish.outputs.sha }}
          ROUTE_COUNT: ${{ steps.routes.outputs.count }}
        with:
          script: |
            const fs = require('fs');
            const marker = '<!-- pr-previews:do-not-edit -->';
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const prNumber = context.issue.number;
            const sha = process.env.SHA || '';
            const routeCount = process.env.ROUTE_COUNT || '0';

            let manifest = [];
            if (fs.existsSync('previews-output/manifest.json')) {
              manifest = JSON.parse(fs.readFileSync('previews-output/manifest.json', 'utf8'));
            }

            const rawUrl = (file) =>
              `https://raw.githubusercontent.com/${owner}/${repo}/pr-previews/pr-${prNumber}/${sha}/${file}`;

            let body;
            if (manifest.length > 0 && sha) {
              const order = [];
              const groups = new Map();
              for (const item of manifest) {
                if (!groups.has(item.label)) {
                  groups.set(item.label, { path: item.path });
                  order.push(item.label);
                }
                groups.get(item.label)[`${item.viewport}-${item.theme}`] = item;
              }
              const cell = (item) =>
                item
                  ? `<img src="${rawUrl(item.file)}" alt="${item.label} ${item.viewport} ${item.theme}" width="400">`
                  : '—';
              const sections = order.map((label) => {
                const g = groups.get(label);
                return [
                  `<details><summary><strong>${label}</strong> — <code>${g.path}</code></summary>`,
                  '',
                  '| | Light | Dark |',
                  '| --- | --- | --- |',
                  `| Desktop | ${cell(g['desktop-light'])} | ${cell(g['desktop-dark'])} |`,
                  `| Mobile | ${cell(g['mobile-light'])} | ${cell(g['mobile-dark'])} |`,
                  '',
                  '</details>',
                ].join('\n');
              });
              const stamp = new Date().toISOString().replace('T', ' ').slice(0, 16);
              body = [
                marker,
                '## 🖼️ Rendered previews',
                `Built from \`${sha}\` · ${order.length} page(s) · updated ${stamp} UTC`,
                '',
                sections.join('\n\n'),
                '',
                '<sub>Auto-generated for the pages this PR changes. Updates on every push.</sub>',
              ].join('\n');
            } else if (routeCount === '0') {
              body = [
                marker,
                '## 🖼️ Rendered previews',
                '',
                'No rendered pages were affected by this change, so no screenshots were generated.',
              ].join('\n');
            } else {
              body = [
                marker,
                '## 🖼️ Rendered previews',
                '',
                '⚠️ Preview generation did not complete for the latest commit. See the workflow run logs.',
              ].join('\n');
            }

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number: prNumber,
              per_page: 100,
            });
            const existing = comments.find((c) => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number: prNumber, body });
            }

  cleanup:
    # On PR close, drop this PR's folder from the pr-previews branch.
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest
    steps:
      - name: Remove previews for closed PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          BRANCH="pr-previews"
          REMOTE="https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          WORK="$(mktemp -d)"

          git -C "$WORK" init -q
          git -C "$WORK" config user.name "github-actions[bot]"
          git -C "$WORK" config user.email "github-actions[bot]@users.noreply.github.com"
          git -C "$WORK" remote add origin "$REMOTE"

          if ! git -C "$WORK" ls-remote --exit-code origin "$BRANCH" >/dev/null 2>&1; then
            echo "No $BRANCH branch; nothing to clean."
            exit 0
          fi

          git -C "$WORK" fetch -q --depth 1 origin "$BRANCH"
          git -C "$WORK" checkout -q -b "$BRANCH" FETCH_HEAD
          if [ -d "$WORK/pr-${PR_NUMBER}" ]; then
            git -C "$WORK" rm -rq "pr-${PR_NUMBER}"
            git -C "$WORK" commit -q -m "previews: clean up PR #${PR_NUMBER}"
            git -C "$WORK" push -q origin "$BRANCH"
          else
            echo "No previews for PR #${PR_NUMBER}."
          fi
