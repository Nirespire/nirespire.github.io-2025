name: Lighthouse CI
permissions:
  contents: read

on:
  pull_request:
    branches: [main]

jobs:
  lighthouse:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build

      # Budgets and score thresholds live in lighthouserc.json. Resource-size
      # budgets (image/css/html weight per page) are hard errors; category
      # scores and LCP are warnings since they can flake on shared runners.
      - name: Run Lighthouse CI
        run: npx --yes @lhci/cli@0.15.x autorun
